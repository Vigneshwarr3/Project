name: Deploy SQL Agent

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          args: --ssh

      - name: Wait for network
        run: sleep 10

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 100.90.162.48
          username: vicky
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export PATH=$PATH:/snap/bin:/usr/local/bin:/usr/bin

            echo "Navigating to project..."
            cd ~/vscode_storage/sql_chatbot/web

            echo "Pulling latest code..."
            git -C .. pull origin main

            echo "Stopping and removing containers..."
            sudo docker compose down --remove-orphans || true
            sudo docker rm -f sql-agent-web 2>/dev/null || true

            echo "Building and starting containers..."
            if ! sudo docker compose up -d --build --remove-orphans; then
              echo "sudo docker compose failed. Container status:"
              sudo docker compose ps
              echo "sql-agent-web logs:"
              sudo docker compose logs --tail=100 sql-agent-web
              exit 1
            fi

            echo "Waiting for services..."
            sleep 20

            echo "Container status:"
            sudo docker compose ps

            echo "Cleaning up old images..."
            sudo docker image prune -f

            echo "Deployment completed successfully!"
